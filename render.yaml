# Render Blueprint — one-click deploy of the FastAPI backend.
# Docs: https://render.com/docs/blueprint-spec
#
# Secrets are sync: false — Render prompts for them at deploy time and they
# are never stored in this repo. The API token is generated by Render; copy
# it from the service's Environment tab into the glasses app settings.

services:
  - type: web
    name: connect-remote-backend
    runtime: python
    region: frankfurt # matches the default EU account region — keep latency low
    plan: free # free tier sleeps after ~15 min idle; first request then takes ~1 min
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      # --- Secrets: entered in the Render dashboard, never committed ---
      - key: CONNECT_REMOTE_USERNAME
        sync: false
      - key: CONNECT_REMOTE_PASSWORD
        sync: false
      - key: CONNECT_REMOTE_PIN
        sync: false
      # Bearer token the glasses app / Siri must send. Render generates a
      # random value on first deploy — copy it from the Environment tab.
      - key: CONNECT_REMOTE_API_TOKEN
        generateValue: true
      # --- Defaults; edit in the dashboard if needed ---
      # Brand matches the app build you installed (3 = Genesis).
      - key: CONNECT_REMOTE_BRAND
        value: "3" # 3 = Genesis
      # Region must match your account's home region (1 = EU).
      - key: CONNECT_REMOTE_REGION
        value: "1" # 1 = EU
      - key: CONNECT_REMOTE_REFRESH_MIN_INTERVAL_SECONDS
        value: "900"
      - key: CONNECT_REMOTE_REFRESH_DAILY_CAP
        value: "20"
      - key: CONNECT_REMOTE_CORS_ORIGINS
        value: "*"
